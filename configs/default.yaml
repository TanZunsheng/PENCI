# PENCI 默认配置
# ================

# 模型配置
model:
  # 编码器设置 (源自 BrainOmni)
  n_dim: 256                    # 特征维度
  n_neuro: 72                   # 源空间脑区数量 (映射到72个脑区)
  n_head: 4                     # 注意力头数量
  dropout: 0.0                  # Dropout 比率
  
  # SEANet 编码器设置
  seanet:
    n_filters: 32               # 基础滤波器数量
    ratios: [8, 4, 2]           # 下采样比率 (总计: 64倍)
    kernel_size: 7              # 卷积核大小
    residual_kernel_size: 3     # 残差块卷积核大小
    last_kernel_size: 7         # 最后一层卷积核大小
    dilation_base: 2            # 膨胀卷积基数
    causal: false               # 是否使用因果卷积
    norm: "weight_norm"         # 归一化类型
    lstm: 2                     # LSTM 层数
    
  # 动力学核心设置
  dynamics:
    type: "transformer"         # 类型: "transformer" 或 "rnn"
    n_layers: 4                 # Transformer 层数
    n_heads: 8                  # 注意力头数量
    dim_feedforward: 1024       # 前馈网络隐藏层维度
    dropout: 0.1                # Dropout 比率
    
  # 物理解码器设置
  physics:
    use_fixed_leadfield: true   # 使用固定物理导联场矩阵 (不通过注意力学习)
    leadfield_path: null        # 导联场矩阵路径 (null 表示动态模式，forward 时传入)

# 数据配置
data:
  root_dir: "/work/2024/tanzunsheng/PENCIData"  # 数据根目录
  datasets:                     # 使用的数据集列表 (全部 10 个)
    - "HBN_EEG"
    - "Brennan_Hale2019"
    - "Grootswagers2019"
    - "THINGS-EEG"
    - "ThingsEEG"
    - "SEED-DV"
    - "Broderick2018_NaturalSpeech"
    - "Broderick2018_NaturalSpeechReverse"
    - "Broderick2018_SpeechInNoise"
    - "Broderick2018_CocktailParty"
  # 注意: Broderick2018 子数据集位于 PENCIData/Broderick2018/ 目录下
  # 元数据路径会自动在 data_root 下查找 {dataset_name}-metadata/
  sample_rate: 256              # 采样率 (Hz)
  window_length: 256            # 窗口长度 (采样点数, 256Hz下为1秒)
  n_channels: 128               # EEG 通道数量
  time_window: 10               # 每个样本的时间窗口 (秒)
  stride: 5                     # 样本间滑动步长 (秒)
  use_bucket_sampler: true      # 使用 BucketBatchSampler (按通道数分桶，动态导联场必须开启)
  file_scheduler:
    enabled: true               # 文件级调度：同一 batch 仅来自一个 HDF5 文件
    shuffle_within_file: true   # 文件进入缓存后，文件内样本随机打乱再组 batch
    val_enabled: true           # 验证阶段也启用文件级调度（降低跨文件随机读取）
    val_shuffle_within_file: false  # 验证阶段文件内顺序采样（更稳定、可复现）
  io_prefetch:
    enabled: true               # 训练前预热 HDF5 到 OS page cache
    warmup_gb: 100              # 每个 epoch 开始前的预热目标
    warmup_each_epoch: true     # 每个 epoch 都执行预热（配合 epoch 级随机顺序）
    prefetch_threads: 1         # 预热线程数（NFS 场景建议 1）
    read_chunk_mb: 8            # 顺序读取块大小
    max_files: 0                # >0 时只预热前 N 个文件；0 表示不限制
    warmup_before_val: true     # 每次验证前也执行预热（同参数，降低验证期 NFS 抖动）
    warmup_val_gb: 100          # 验证前预热目标（默认与 warmup_gb 保持一致）
    max_files_val: 0            # 验证前预热文件上限；0 表示不限制

# 物理约束配置
physics:
  subjects_dir: "/work/2024/tanzunsheng/mne_data/MNE-fsaverage-data"  # fsaverage 数据目录
  leadfield_cache_dir: "/work/2024/tanzunsheng/leadfield_cache"       # 导联场缓存目录
  processed_data_dir: "/work/2024/tanzunsheng/ProcessedData"          # BIDS 格式数据目录 (含 electrodes.tsv)
  # 离线预计算的指纹注册表存档路径（由 scripts/precompute_all_leadfields.py 生成）
  # 设置后 setup_physics() 优先从存档加载，跳过运行时扫描 ProcessedData
  # 设为 null 则沿用旧的运行时扫描模式（向后兼容）
  fingerprint_registry_path: "/work/2024/tanzunsheng/leadfield_cache/fingerprint_registry.pt"

# 训练配置
training:
  # --- 单卡基准参数 (DDP 自动缩放，见下方注释) ---
  batch_size: 32                # 每卡批次大小 (per-GPU batch size)
  num_workers: 1                # 每卡 DataLoader worker；共享 NFS 下低并发更稳
  learning_rate: 5.0e-5         # 单卡基准学习率 (降低以缓解 loss NaN)
  weight_decay: 0.01            # 权重衰减
  warmup_steps: 3000            # 学习率线性预热步数 (延长以平滑 warmup 结束过渡)
  max_steps: 100000             # 最大训练步数 (全局，非 per-GPU)
  gradient_clip: 0.5            # 梯度裁剪阈值 (加强以抑制梯度爆炸)
  # DDP 缩放规则 (由 train.py 自动执行):
  #   effective_lr = learning_rate * world_size        (线性缩放)
  #   warmup_steps 保持不变 (已按全局步数定义)
  #   max_steps 保持不变 (按全局步数计算)
  #   batch_size 为 per-GPU，全局 batch = batch_size * world_size
  
  # 损失函数权重
  loss:
    reconstruction: 1.0         # 传感器空间重建损失权重
    dynamics: 0.1               # 动力学正则化损失权重
    
  # 日志设置
  log_interval: 100             # 日志记录间隔 (步)
  save_interval: 5000           # 模型保存间隔 (步)
  eval_interval: 1000           # 评估间隔 (步)

  # NaN/Inf 诊断设置
  nan_guard:
    enabled: true               # 训练中检测 NaN/Inf
    fail_fast: true             # 首次命中异常时立即终止，优先定位问题
    skip_bad_batch: false       # 仅在 fail_fast=false 时生效：跳过异常 batch
    max_records: 50             # 每个 rank 最多记录的异常 batch 数
    max_metadata_items: 128     # 每次记录最多写入多少条样本路径
    dump_tensors: false         # 是否额外保存异常 batch 张量快照 (.pt)
    dump_max_samples: 4         # 保存张量快照时，每个 batch 最多保留前 N 条样本
    record_file: "bad_batches"  # 输出到 outputs/.../diagnostics/{record_file}.rank*.jsonl
    dump_dir: "bad_batch_tensors"

# 分布式训练配置
distributed:
  backend: "nccl"               # 通信后端 (nccl 适用于 GPU)
  find_unused_parameters: false # DDP 是否查找未使用参数 (PENCI 无需)

# 硬件配置
hardware:
  device: "cuda"                # 设备类型: "cuda" 或 "cpu"
  mixed_precision: true         # 是否使用混合精度训练 (AMP)
  compile: false                # 是否使用 torch.compile (PyTorch 2.0+)

# 评估配置
evaluation:
  # 传感器空间重建指标 (层级1)
  sensor_metrics:
    - "pearson"                 # Pearson 相关系数
    - "snr_db"                  # 信噪比 (dB)
    - "nrmse"                   # 归一化均方根误差
  # 源空间对比 (层级2)
  source_comparison:
    method: "sLORETA"           # 传统逆解方法
    lambda2: 0.1111             # 正则化参数 (1/SNR^2, SNR=3)
    loose: 0.2                  # 偶极子方向松弛度
    depth: 0.8                  # 深度加权
  # 仿真测试 (层级3)
  simulation:
    n_trials: 50                # 仿真试验次数
    n_dipoles: 1                # 每次试验放置的偶极子数量
    nave: 20                    # 仿真平均次数 (影响信噪比)

# 路径配置
paths:
  checkpoint_dir: "checkpoints" # 模型检查点保存目录
  log_dir: "logs"               # 日志保存目录
  output_dir: "outputs"         # 输出结果保存目录
