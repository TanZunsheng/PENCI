# PENCI V1 Stage1 仿真预训练配置

model:
  n_dim: 256
  n_neuro: 72
  n_head: 4
  dropout: 0.0
  window_size: 512
  seanet:
    n_filters: 32
    ratios: [8, 4, 2]
    kernel_size: 7
    last_kernel_size: 7
  physics:
    use_fixed_leadfield: true
    leadfield_path: null
    sensor_average_reference: true
  stage1:
    hidden_dim: 128
    state_activation: "identity"

data:
  n_channels: 128
  use_bucket_sampler: true
  use_fingerprint: true
  stage1_sim_train_metadata: "/work/2024/tanzunsheng/PENCI_sim_data/stage1_all_templates/hdf5/stage1_train_metadata_hdf5_all.json"
  stage1_sim_val_metadata: "/work/2024/tanzunsheng/PENCI_sim_data/stage1_all_templates/hdf5/stage1_val_metadata_hdf5_all.json"
  file_scheduler:
    enabled: true
    shuffle_within_file: true
    val_enabled: true
    val_shuffle_within_file: false
  io_prefetch:
    enabled: true
    warmup_gb: 20
    low_watermark_gb: 10
    warmup_each_epoch: true
    async_refill: true
    scope: "node_union"
    startup_policy: "high_watermark"
    prefetch_threads: 1
    read_chunk_mb: 8
    max_files: 0
    warmup_before_val: true
    warmup_val_gb: 4
    max_files_val: 0

training:
  epochs: 20
  batch_size: 16
  num_workers: 0
  ddp:
    find_unused_parameters: false
  learning_rate: 1.0e-4
  weight_decay: 0.0
  loss:
    reconstruction: 1.0
    state_supervision: 1.0
    state_smoothness: 1.0e-2
    state_energy: 1.0e-3

hardware:
  device: "cuda"

paths:
  output_dir: "outputs/stage1_sim_mixed_hdf5"
